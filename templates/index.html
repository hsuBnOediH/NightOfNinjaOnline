<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者之夜 Online</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body>
    <!-- Background -->
    <div class="background"></div>

    <!-- Main Container -->
    <div class="container">

        <!-- Lobby Screen -->
        <div id="lobby-screen" class="screen active">
            <div class="logo-container">
                <h1 class="game-title">忍者之夜</h1>
                <p class="game-subtitle">Night of Ninja Online</p>
            </div>

            <div class="lobby-panel glass-panel">
                <div class="input-group">
                    <label for="player-name">玩家名称</label>
                    <input type="text" id="player-name" placeholder="输入你的名字" maxlength="12">
                </div>

                <div class="avatar-selector">
                    <label>选择头像</label>
                    <div class="avatar-grid" id="avatar-grid">
                        <!-- Generated by JS -->
                    </div>
                </div>

                <div class="lobby-actions">
                    <button class="btn btn-primary" id="create-room-btn">创建房间</button>
                    <div class="divider"><span>或</span></div>
                    <div class="join-room-group">
                        <input type="text" id="room-code-input" placeholder="房间代码" maxlength="4">
                        <button class="btn btn-secondary" id="join-room-btn">加入房间</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Waiting Room -->
        <div id="waiting-screen" class="screen">
            <div class="room-header glass-panel">
                <div class="room-info">
                    <h2>房间代码</h2>
                    <div class="room-code-container" style="display:flex; align-items:center; gap:10px;">
                        <div class="room-code" id="display-room-code">----</div>
                        <button class="btn btn-sm btn-secondary" id="copy-room-btn"
                            style="padding: 4px 10px; font-size: 0.8em;">复制</button>
                    </div>
                </div>
                <button class="btn btn-danger" id="leave-room-btn">离开房间</button>
            </div>

            <div class="waiting-panel glass-panel">
                <h3>等待玩家中...</h3>
                <div class="player-list" id="waiting-player-list">
                    <!-- Players will be added here -->
                </div>
                <button class="btn btn-primary" id="start-game-btn" style="display:none;">开始游戏</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Stage Guidance Banner -->
            <div class="stage-banner glass-panel">
                <div class="stage-content">
                    <h2 id="stage-title" class="stage-title">游戏准备中...</h2>
                    <p id="stage-description" class="stage-description">等待游戏开始</p>
                </div>
            </div>

            <!-- Header -->
            <div class="game-header">
                <div class="round-info">
                    <span>回合 <span id="round-number">1</span></span>
                    <span id="phase-indicator">阶段</span>
                </div>
                <div class="honor-info">
                    <span>荣誉池: <span id="honor-pool-count">--</span></span>
                    <span>我的荣誉: <span id="my-honor-count">0</span></span>
                </div>
            </div>

            <!-- Player Board -->
            <div class="player-board" id="player-board">
                <!-- Players displayed in circle -->
            </div>

            <!-- Your Info -->
            <div class="player-info-panel glass-panel">
                <div class="your-house" id="your-house">
                    <span>你的家族:</span>
                    <div class="house-card" id="house-display">
                        <img src="" alt="House" id="house-img">
                        <div class="house-info">
                            <span id="house-name">???</span>
                            <span id="house-tier" class="house-tier"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Draft & Hand Layout -->
            <div class="draft-layout">
                <!-- Drafted Cards Collection -->
                <div class="draft-collection-panel glass-panel" id="draft-collection-panel" style="display: none;">
                    <h3>已保留卡牌</h3>
                    <div class="draft-collection" id="draft-collection">
                        <!-- Drafted cards will be shown here -->
                    </div>
                </div>

                <!-- Hand Cards -->
                <div class="hand-panel glass-panel" id="hand-panel">
                    <h3 id="hand-title">你的手牌</h3>
                    <div class="card-hand" id="card-hand">
                        <!-- Cards will be shown here -->
                    </div>
                </div>
            </div>

            <!-- Game Log -->
            <div class="game-log glass-panel">
                <h4>游戏记录</h4>
                <div class="log-content" id="game-log">
                    <!-- Log messages -->
                </div>
            </div>
        </div>

    </div>

    <!-- Modals moved to body level -->
    <div id="target-modal" class="modal">
        <div class="modal-content glass-panel">
            <h3 id="target-modal-title">选择目标</h3>
            <div class="target-list" id="target-list"></div>
            <button class="btn btn-secondary" id="cancel-target-btn">取消</button>
        </div>
    </div>

    <div id="info-modal" class="modal">
        <div class="modal-content glass-panel">
            <h3 id="info-title">信息</h3>
            <div id="info-content"></div>
            <div style="text-align:center; margin-top:20px;">
                <button class="btn btn-primary" id="close-info-btn">确定</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal">
        <div class="modal-content glass-panel" style="max-width: 400px; text-align: center;">
            <h3 id="confirm-title" style="margin-bottom: 16px;">确认</h3>
            <p id="confirm-message" style="margin-bottom: 24px; color: var(--text-secondary);"></p>
            <div class="modal-actions" style="display: flex; justify-content: center; gap: 16px;">
                <button class="btn btn-secondary" id="confirm-cancel-btn">取消</button>
                <button class="btn btn-primary" id="confirm-ok-btn">确定</button>
            </div>
        </div>
    </div>

    <script src="/static/js/client.js"></script>
</body>

</html>
