services:
  - type: web
    name: night-of-ninja-online
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
